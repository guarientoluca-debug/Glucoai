name: Weekly Diabetes Report

on:
  schedule:
    - cron: '0 7 * * 1'  # Ogni lunedì alle 07:00 UTC (09:00 ora italiana)
  workflow_dispatch:       # Esecuzione manuale per test

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install nodemailer

      - name: Send weekly report
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node weekly-report.js

      - name: Commit rapporti adattivi aggiornati
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add user-data.json
          git diff --cached --quiet || git commit -m "🧠 Aggiorna rapporti adattivi insulina [$(date +'%Y-%m-%d')]"
          git push
